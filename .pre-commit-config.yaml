repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: restage-formatted
        name: Re-stage formatter changes
        language: system
        entry: git add
        pass_filenames: true
        stages: [pre-commit]
